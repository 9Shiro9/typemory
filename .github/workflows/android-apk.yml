name: Build Android APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Capacitor
        run: npm install

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html manifest.webmanifest sw.js www/
          cp -r icons www/
          cp -r assets www/

      - name: Generate Android project
        run: |
          npx cap add android
          npx cap sync android

      - name: Generate launcher icons and splash
        run: npx @capacitor/assets generate --android

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          V="${GITHUB_REF_NAME#v}"
          CODE=$((GITHUB_RUN_NUMBER + 100))
          sed -i "s/versionName \"1.0\"/versionName \"$V\"/" android/app/build.gradle
          sed -i "s/versionCode 1/versionCode $CODE/" android/app/build.gradle

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$KS_B64" | base64 -d > release.keystore
          BT="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          "$BT/zipalign" -f 4 android/app/build/outputs/apk/release/app-release-unsigned.apk Typemory-aligned.apk
          "$BT/apksigner" sign --ks release.keystore --ks-pass env:KS_PASS \
            --ks-key-alias "$KEY_ALIAS" --out "Typemory-${GITHUB_REF_NAME}.apk" Typemory-aligned.apk
          "$BT/apksigner" verify "Typemory-${GITHUB_REF_NAME}.apk"
          rm -f release.keystore Typemory-aligned.apk

      - name: Attach APK to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Typemory-*.apk
          generate_release_notes: true

      - name: Upload artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: typemory-apk
          path: Typemory-*.apk
